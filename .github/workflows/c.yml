name: 通cccc
on:
  workflow_dispatch:

jobs:
  build:
    name: 
    runs-on: ubuntu-22.04  
    if: github.event.repository.owner.id == github.event.sender.id
    
    steps:
    - uses: actions/checkout@v4


    - name: 环境变量配置
      run: |
        cat config.env | grep KERNEL_SOURCE= >> $GITHUB_ENV
        cat config.env | grep KERNEL_SOURCE_BRANCH= >> $GITHUB_ENV
        cat config.env | grep KERNEL_CONFIG= >> $GITHUB_ENV
        cat config.env | grep KERNEL_ZIP_NAME= >> $GITHUB_ENV
        cat config.env | grep LLVM_CONFIG= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KERNELSU= >> $GITHUB_ENV
        cat config.env | grep KERNELSU_TAG= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KVM= >> $GITHUB_ENV
        cat config.env | grep ENABLE_LXC_DOCKER= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KERNELSU= >> $GITHUB_ENV
        cat config.env | grep KERNELSU_TAG= >> $GITHUB_ENV

        
    - name: 构建编译内核环境
      run: |
        sudo apt-get update
        sudo -E apt-get -y -qq install git make bc bison ccache openssl zip kmod cpio flex libelf-dev curl libssl-dev libtfm-dev wget device-tree-compiler ca-certificates python3 binutils binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi
        sudo -E apt-get -y -qq install build-essential gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi gcc-arm-linux-gnueabihf
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
    
    - name: 下载谷歌 Clang12 编译器（必须用这个！）
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        rm -rf clang-aosp
        mkdir -p clang-aosp
        git clone -q --depth=1 --single-branch \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          -b android12-release clang-aosp
          
    - name: 安装Python2 并设置为默认
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python2-minimal
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        python --version
        echo "Python2 设置完成 ✅"

        
    - name: 下载内核源码
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
    - name: 开启lxc和docker配置
      if: env.ENABLE_LXC_DOCKER == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/2.0.0/add-lxc-docker-custom3.sh
        chmod 755 add-lxc-docker-custom3.sh
        ./add-lxc-docker-custom3.sh android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}
        echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> android-kernel/arch/arm64/configs/${{ env.KERNEL_CONFIG }}

        
    - name: 添加runc补丁
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/runcpatch.sh
        chmod a+x runcpatch.sh
        if [ -f android-kernel/kernel/cgroup.c ]; then
        ./runcpatch.sh android-kernel/kernel/cgroup.c               
        fi
        if [ -f android-kernel/kernel/cgroup/cgroup.c ]; then
        ./runcpatch.sh android-kernel/kernel/cgroup/cgroup.c               
        fi

        
    - name: 设置ccache缓存
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-mido-kernel
        max-size: 2G



            
    - name: 开始编译内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # 1. 路径与工具链准备
        CLANG_DIR=$(find $GITHUB_WORKSPACE/kernel_workspace/clang-aosp -maxdepth 1 -name "clang-r*" | head -n1)
        export PATH=$CLANG_DIR/bin:$PATH
        
        # 补全交叉工具链软链接
        for tool in gcc g++ ld objcopy objdump nm strip ar as ranlib; do
          sudo ln -sf /usr/bin/aarch64-linux-gnu-$tool /usr/bin/aarch64-linux-android-$tool || true
          sudo ln -sf /usr/bin/arm-linux-gnueabi-$tool /usr/bin/arm-linux-android-eabi-$tool || true
        done
        
        # 【关键修复】修改编译器选项
        export CC="ccache clang"
        export HOSTCC="ccache clang"
        export HOSTCXX="ccache clang++"
        export HOSTCFLAGS="-I$PWD/out/include"
        export HOSTCXXFLAGS="-I$PWD/out/include"
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        
        # 【核心变更】强制使用 GNU 工具链，彻底禁用 LLVM 干预汇编
        export AS=aarch64-linux-gnu-as
        export LD=aarch64-linux-gnu-ld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        
        # ===================================================================
        # 【新增修复】解决 "operand mismatch" 和 "array-bounds" 错误
        # ===================================================================
        # 1. 禁用 LLVM 的内置汇编器 (IAS)，强制使用 GNU as
        export LLVM_IAS=0 
        # 2. 告诉编译器不要将 array-bounds 警告视为错误 (通用保险)
        export KBUILD_CFLAGS="$KBUILD_CFLAGS -Wno-array-bounds"
        
        echo "=== 环境检查 ==="
        echo "Clang: $(clang --version | head -n1)"
        # 修复 Python 警告
        alias python=python3
        echo "Python: $(python --version)"
        echo "CC: $CC"
        echo "AS: $AS"
        echo "LLVM_IAS: $LLVM_IAS"
        echo "KBUILD_CFLAGS: $KBUILD_CFLAGS"
    
        # 2. 内核配置
        make O=out ARCH=arm64 cezanne_user_defconfig
        
        # 【修复】DTC 补丁
        echo "=== Patching DTC for yylloc ==="
        if [ -f scripts/dtc/dtc-lexer.l ]; then
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.l
        fi
        if [ -f scripts/dtc/dtc-lexer.lex.c ]; then
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c
        fi
        if [ -f scripts/dtc/dtc-lexer.lex.c_shipped ]; then
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped
        fi
        
        echo "=== Disabling Stack Protector ==="
        scripts/config --file out/.config -d CC_STACKPROTECTOR_STRONG
        scripts/config --file out/.config -d CC_STACKPROTECTOR_REGULAR
        scripts/config --file out/.config -e CC_STACKPROTECTOR_NONE
        make O=out ARCH=arm64 olddefconfig
    
        # ===================================================================
        # 【物理修复】强制生成 asm-offsets.h 并复制到根目录
        # ===================================================================
        echo "=== PHYSICAL FIX: Generating asm-offsets.h ==="
        
        # 1. 强制生成中间文件
        make O=out ARCH=arm64 prepare
        
        # 2. 在源码根目录创建 generated 文件夹
        mkdir -p generated
        
        # 3. 检查并复制文件
        if [ -f out/include/generated/asm-offsets.h ]; then
          cp out/include/generated/asm-offsets.h generated/asm-offsets.h
          echo " SUCCESS: asm-offsets.h copied to source root"
        else
          echo " ERROR: Failed to generate asm-offsets.h"
          exit 1
        fi
    
        # ===================================================================
        # 【终极修复】Clang 兼容性补丁 (极简版 - 避免头文件缺失)
        # ===================================================================
        echo "=== FORCING Clang Compatibility Patches (Minimalist) ==="
    
        # -------------------------------------------------------------------
        # 修复 1: stack_pointer.h (极简修复版)
        # -------------------------------------------------------------------
        # 直接返回 sp 寄存器的值，不引用任何额外头文件
        cat > arch/arm64/include/asm/stack_pointer.h << 'EOF'
        #ifndef __ASM_STACK_POINTER_H
        #define __ASM_STACK_POINTER_H
        #ifdef __KERNEL__
        
        static inline unsigned long get_current_sp(void)
        {
            unsigned long sp;
            asm volatile("mov %0, sp" : "=r" (sp));
            return sp;
        }
        
        #endif
        #endif
        EOF
            echo "✅ FORCED stack_pointer.h (Minimalist fix)"
        
            # -------------------------------------------------------------------
            # 修复 2: spinlock.h (硬编码修复版)
            # -------------------------------------------------------------------
            # 直接覆盖整个文件内容，彻底解决 add w4, w4, x2 错误
            cat > arch/arm64/include/asm/spinlock.h << 'EOF'
        #ifndef __ASM_SPINLOCK_H
        #define __ASM_SPINLOCK_H
        
        #ifndef __ASM_SPINLOCK_TYPES_H
        #include <asm/spinlock_types.h>
        #endif
        
        #include <asm/barrier.h>
        #include <asm/processor.h>
        #include <linux/atomic/atomic-lse.h>
        
        static inline void arch_spin_lock(arch_spinlock_t *lock)
        {
            arch_spinlock_t lockval, newval;
            u32 tmp;
        
            asm volatile(
                " prfm pstl1strm, %3\n"
                "1: ldaxr %w0, %3\n"
                " add %w1, %w0, %w4\n"
                " stxr %w2, %w1, %3\n"
                " cbnz %w2, 1b"
                : "=&r" (lockval), "=&r" (newval), "=&r" (tmp), "+Q" (*lock)
                : "r" (1 << TICKET_SHIFT)
                : "memory");
        
            preempt_disable();
        }
        
        static inline void arch_spin_unlock(arch_spinlock_t *lock)
        {
            arch_spinlock_t lockval;
            u32 tmp;
        
            asm volatile(
                " ldaxr %w0, %2\n"
                " add %w0, %w0, %w3\n"
                " stlxr %w2, %w0, %2"
                : "=&r" (lockval), "+Q" (*lock), "=&r" (tmp)
                : "r" (1 << TICKET_SHIFT)
                : "memory");
        
            preempt_enable();
        }
        
        static inline int arch_spin_trylock(arch_spinlock_t *lock)
        {
            arch_spinlock_t lockval;
            u32 tmp;
        
            asm volatile(
                " ldaxr %w0, %2\n"
                " eor %w1, %w0, %w0, ror #16\n"
                " cbz %w1, 1f\n"
                " mov %w0, #0\n"
                " cbnz %w0, 1f\n"
                " stxr %w1, %w0, %2\n"
                "1:"
                : "=&r" (lockval), "=&r" (tmp), "+Q" (*lock)
                :
                : "memory");
        
            if (lockval & 0xffff) {
                preempt_disable();
                return 1;
            } else {
                return 0;
            }
        }
        
        #endif
        EOF
            echo "✅ FORCED spinlock.h (Fixed operand mismatch)"
        
            # -------------------------------------------------------------------
            # 修复 3: xts.c (彻底解决 free/xts_free 冲突)
            # -------------------------------------------------------------------
            if [ -f crypto/xts.c ]; then
              sed -i '/inst->free/d' crypto/xts.c
              sed -i '/inst->init = xts_init;/a \ \ \ \ inst->free = NULL;' crypto/xts.c
              echo "✅ Patched crypto/xts.c"
            fi
        
            # 5. 最终编译
            echo "=== Starting Kernel Build ==="
            make -j$(nproc --all) O=out ARCH=arm64
            
            # 检查输出
            if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
              echo "Kernel built successfully"
              exit 0
            else
              echo "Build failed"
              exit 1
            fi
          shell: /usr/bin/bash -e {0}
          env:
            KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
            KERNEL_SOURCE_BRANCH: cezanne-q-oss
            KERNEL_CONFIG: cezanne_user_defconfig
            KERNEL_ZIP_NAME: vince_lxc-docker-kernel-4.19_202602190400
            LLVM_CONFIG: y
            ENABLE_KERNELSU: false
            KERNELSU_TAG: main
            ENABLE_KVM: false
            ENABLE_LXC_DOCKER: true


                      
    - name: 准备打包内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=/dev/block/bootdevice/by-name/boot;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=1;/is_slot_device=0;/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        rm -rf AnyKernel3/.git* AnyKernel3/README.md
        rm -rf AnyKernel3/ramdisk AnyKernel3/modules AnyKernel3/patch
    
    
    - name: 打包并上传
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_ZIP_NAME }}
        path: kernel_workspace/AnyKernel3/*
